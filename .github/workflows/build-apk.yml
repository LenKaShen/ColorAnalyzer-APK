name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache buildozer global (SDK/NDK/ANT)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-

      - name: Cache buildozer local (compiled recipes)
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          restore-keys: buildozer-local-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk python3-pip python3-venv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            ccache

      - name: Install buildozer + cython
        run: pip3 install --user --upgrade cython buildozer

      - name: Build APK
        env:
          MAKEFLAGS: "-j$(nproc)"
        run: buildozer android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ColorAnalyzer-debug
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
