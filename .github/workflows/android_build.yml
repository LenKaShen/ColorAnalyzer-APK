name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
      - name: Build APK (Gradle or Buildozer)
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends \
              git zip unzip python3-pip python3-venv \
              autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
              libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev ccache
            pip3 install --user --upgrade "cython<3" buildozer
            ~/.local/bin/buildozer android debug
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: MicrobeScanner
          path: |
            app/build/outputs/apk/debug/*.apk
            bin/*.apk
