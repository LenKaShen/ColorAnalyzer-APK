name: Build Android APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache buildozer global (SDK/NDK/ANT)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec', 'requirements.txt') }}-microbe
          restore-keys: buildozer-global-

      - name: Cache buildozer local (compiled recipes)
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec', 'requirements.txt') }}-microbe
          restore-keys: buildozer-local-

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip python3-pip python3-venv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            ccache

      - name: Install buildozer + cython
        run: pip3 install --user --upgrade "cython<3" buildozer

      - name: Build APK
        env:
          MAKEFLAGS: "-j$(nproc)"
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: ~/.local/bin/buildozer android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MicrobeScanner
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
